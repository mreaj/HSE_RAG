# Persistent Qdrant server. Vectors are stored in the named volume
# `qdrant_storage`, so they survive `docker compose down` / restarts —
# this is what "store my vectors always" means in practice.
#
#   docker compose up -d
#
# Then set QDRANT_URL=http://localhost:6333 in your .env.
services:
  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    ports:
      - "6333:6333"   # REST/gRPC
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_storage:/qdrant/storage
    # For an API-key protected server, uncomment:
    # environment:
    #   QDRANT__SERVICE__API_KEY: "your-strong-key"

volumes:
  qdrant_storage:
